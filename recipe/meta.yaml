{% set name = "study-chinese-cli" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - sc = sc.cli:app

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling >=1.24.0
  run:
    - python >=3.11
    - rich >=13.7.0
    - typer >=0.12.3

test:
  requires:
    - pytest >=8.3.0
  commands:
    - python -m pytest tests
    - sc --help

about:
  summary: Standalone CLI flashcard app for Chinese study.
  license: Unspecified

